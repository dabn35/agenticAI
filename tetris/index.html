<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tetris</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Background decorative elements -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        
        <header>
            <h1>TETRIS</h1>
        </header>

        <main class="content-wrapper">
            <div class="left-panel panel">
                <div class="info-box">
                    <h3>SCORE</h3>
                    <p id="score">0</p>
                </div>
                <div class="info-box">
                    <h3>LEVEL</h3>
                    <p id="level">1</p>
                </div>
                <div class="info-box">
                    <h3>LINES</h3>
                    <p id="lines">0</p>
                </div>
            </div>

            <div class="board-container">
                <canvas id="board" width="300" height="600"></canvas>
                <div id="game-over-modal" class="modal hidden">
                    <h2>GAME OVER</h2>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <button id="restart-btn">PLAY AGAIN</button>
                </div>
            </div>

            <div class="right-panel panel">
                <div class="info-box next-piece-box">
                    <h3>NEXT</h3>
                    <canvas id="next-piece" width="120" height="120"></canvas>
                </div>
                <div class="controls-hint">
                    <h3>CONTROLS</h3>
                    <ul>
                        <li><kbd>↑</kbd> Rotate</li>
                        <li><kbd>←</kbd><kbd>→</kbd> Move</li>
                        <li><kbd>↓</kbd> Soft Drop</li>
                        <li><kbd>Space</kbd> Hard Drop</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
